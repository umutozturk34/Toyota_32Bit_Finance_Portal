name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  finance-common-test:
    name: finance-common test + jacoco
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test finance-common
        working-directory: finance-common
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp verify
      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-finance-common
          path: finance-common/target/site/jacoco/jacoco.xml
          if-no-files-found: warn

  backend-test:
    name: backend reactor test + jacoco aggregate
    runs-on: ubuntu-latest
    needs: finance-common-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test backend reactor
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp verify
      - name: Upload jacoco aggregate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-backend-aggregate
          path: backend/finance-coverage/target/site/jacoco-aggregate/jacoco.xml
          if-no-files-found: warn

  notification-test:
    name: notification-backend test + jacoco
    runs-on: ubuntu-latest
    needs: finance-common-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test notification-backend
        working-directory: notification-backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp verify
      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-notification
          path: notification-backend/target/site/jacoco/jacoco.xml
          if-no-files-found: warn

  frontend-lint:
    name: frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint

  sonar:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    needs: [backend-test, finance-common-test, notification-test, frontend-lint]
    if: vars.SONAR_HOST_URL != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Download backend jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-backend-aggregate
          path: backend/finance-coverage/target/site/jacoco-aggregate
      - name: Download finance-common jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-finance-common
          path: finance-common/target/site/jacoco
      - name: Download notification jacoco
        uses: actions/download-artifact@v4
        with:
          name: jacoco-notification
          path: notification-backend/target/site/jacoco
      - name: Run sonar-scanner
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  docker-backend:
    name: build + push backend image
    runs-on: ubuntu-latest
    needs: [backend-test, finance-common-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finance-portal-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=finance-portal-backend
          cache-to: type=gha,mode=max,scope=finance-portal-backend

  docker-notification-backend:
    name: build + push notification-backend image
    runs-on: ubuntu-latest
    needs: [notification-test, finance-common-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finance-portal-notification-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: notification-backend/Dockerfile
          push: true
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=finance-portal-notification-backend
          cache-to: type=gha,mode=max,scope=finance-portal-notification-backend

  docker-frontend:
    name: build + push frontend image
    runs-on: ubuntu-latest
    needs: frontend-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/finance-portal-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_KEYCLOAK_URL=${{ vars.VITE_KEYCLOAK_URL }}
            VITE_KEYCLOAK_REALM=${{ vars.VITE_KEYCLOAK_REALM }}
            VITE_KEYCLOAK_CLIENT_ID=${{ vars.VITE_KEYCLOAK_CLIENT_ID }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=finance-portal-frontend
          cache-to: type=gha,mode=max,scope=finance-portal-frontend

  compose-validate:
    name: docker compose validate
    runs-on: ubuntu-latest
    needs: [docker-backend, docker-notification-backend, docker-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose config --quiet
      - name: Resolve referenced images
        run: docker compose config --images
