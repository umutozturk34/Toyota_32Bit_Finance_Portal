name: Publish finance-common to GitHub Packages

# finance-common is a -SNAPSHOT version, which GitHub Packages permits RE-deploying (a release version like
# 1.0.0 is immutable and 409s on the second publish). So every push that changes the library republishes it
# cleanly, and consumers (backend, notification-backend) always resolve the latest build.
on:
  push:
    branches: [main]
    paths:
      - 'finance-common/**'
      - '.github/workflows/publish-finance-common.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy finance-common
        working-directory: finance-common
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy -DskipTests
