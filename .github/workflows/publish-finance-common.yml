name: Publish finance-common to GitHub Packages

# Manual-only. finance-common is built FROM SOURCE by CI (every job runs `mvn install`) and the prod deploy
# pulls Docker images, so NOTHING consumes this GitHub Packages artifact on a push — auto-publishing only
# produced a recurring 409 (Packages rejects re-deploying the same release version) and never gated anything
# (deploy.yml watches the "CI" workflow, not this one). Publish deliberately instead: bump finance-common's
# version, then run this workflow from the Actions tab.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy finance-common
        working-directory: finance-common
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B deploy -DskipTests
