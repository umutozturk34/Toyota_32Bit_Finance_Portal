spring:
  application:
    name: finance-portal-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms

  
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs}

app:
  api:
    coingecko:
      base-url: https://api.coingecko.com/api/v3
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      api-key-header: x-cg-demo-api-key
      markets-path: /coins/markets
    bond:
      base-url: https://evds3.tcmb.gov.tr/igmevdsms-dis
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      api-key-header: key
      serie-list-path: /serieList/type=json&code=
      series-path: /series=
    yahoo:
      base-url: https://query1.finance.yahoo.com/v8/finance/chart/
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      chart-path: ""
    binance:
      base-url: https://api.binance.com
      klines-path: /api/v3/klines
  
  tcmb:
    base-url: ${TCMB_BASE_URL:https://www.tcmb.gov.tr}
    xml-path: /kurlar/today.xml

  tefas-api-path: /api/funds/fonGnlBlgSiraliGetir
  tefas-base-url: https://www.tefas.gov.tr
  tefas-session-path: /TarihselVeriler.aspx
  timezone: Europe/Istanbul
  scale: 4

  http:
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
    default-user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    bond-max-in-memory-size-mb: 10
    news-max-in-memory-size-mb: 5

  async:
    core-pool-size: 3
    max-pool-size: 5
    queue-capacity: 25

  crypto:
    history-days: 365
    min-candles-for-healthy: 350

  bond:
    batch-size: 10
    max-days-per-request: 1000
    datagroup-code: bie_pydibs
    rate-threshold: 0.5
    auction-threshold: 14
    cpi-fixed-threshold: 5
    face-value: 100
    days-in-year: 365

  stock:
    history-years: 5

  forex:
    years-to-keep: 5
    spread-rate: 0.01

  fund:
    years-to-fetch: 5
    min-candles-for-incremental: 30
    window-sizes: 30

  commodity:
    years-to-keep: 5
    yahoo-symbol-overrides:
      XAUTRY: "GC=F"
      XAGTRY: "SI=F"
      XPTTRY: "PL=F"
      XPDTRY: "PA=F"
    derivatives:
      - source-code: "XAUTRY"
        derivative-code: "XAUTRYG"
        divisor: 31.1035
      - source-code: "XAGTRY"
        derivative-code: "XAGTRYG"
        divisor: 31.1035

  news:
    max-articles-per-source: 50
    cache-ttl-hours: 24
    default-category-limit: 20
    category-limits:
      "[CRYPTO]": 20
      "[BORSA_ISTANBUL]": 30
      "[BORSA_SIRKETLERI]": 20
      "[TAHVIL_BONO]": 20
      "[PARITE]": 20
      "[EMTIA]": 20
      "[GENEL_FINANS]": 60

  commission:
    stock-rate: 0.002
    crypto-rate: 0.0015
    fund-rate: 0.001
    commodity-rate: 0.015

  scheduler:
    crypto:
      morning-cron: "0 0 9 * * *"
      afternoon-cron: "0 0 15 * * *"
      evening-cron: "0 0 21 * * *"
    stock:
      morning-cron: "0 15 10 * * MON-FRI"
      afternoon-cron: "0 15 14 * * MON-FRI"
      evening-cron: "0 15 19 * * MON-FRI"
    forex:
      morning-cron: "0 30 10 * * *"
      afternoon-cron: "0 0 16 * * *"
      evening-cron: "0 0 22 * * *"
    news:
      morning-cron: "0 0 8 * * *"
      afternoon-cron: "0 30 14 * * *"
      evening-cron: "0 30 21 * * *"
    fund:
      daily-cron: "0 30 11 * * *"
    commodity:
      morning-cron: "0 45 10 * * *"
      afternoon-cron: "0 30 16 * * *"
      evening-cron: "0 30 22 * * *"
    bond:
      daily-cron: "0 0 20 * * *"
    portfolio:
      snapshot-cron: "0 0 23 * * *"

  pagination:
    market:
      default-size: 20
      max-size: 100
      default-overview-limit: 10
      max-overview-limit: 20
    bond:
      default-size: 8
      max-size: 100
    news:
      default-size: 10
      max-size: 100
    portfolio:
      transactions-default-size: 10
      positions-default-size: 10
      max-size: 100

  portfolio:
    default-name: Ana Portföy
    default-currency: TRY
    initial-balance: 100000.0000
    min-transaction-amount-try: 10

  task:
    max-history: 50

  tracked-asset:
    code-cache-ttl-seconds: 45

  security:
    cors:
      allowed-origin-patterns:
        - http://localhost
        - http://localhost:*
        - http://127.0.0.1
        - http://127.0.0.1:*
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      allowed-headers:
        - Authorization
        - Content-Type
        - Cache-Control
        - X-Requested-With
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age-seconds: 3600

  cache:
    redis-default-ttl-hours: 24

  rate-limit:
    admin-trigger-limit: 20
    admin-read-limit: 20
    api-limit: 60

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    oauth2-redirect-url: ${SWAGGER_OAUTH2_REDIRECT:http://localhost/swagger-ui/oauth2-redirect.html}
    oauth:
      client-id: finance-frontend
      use-pkce-with-authorization-code-grant: true

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      tefas:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - com.finance.backend.exception.ExternalApiRequestException
      yahoo:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      coingecko:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
      bond:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      tcmb:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
      news:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
  ratelimiter:
    instances:
      yahoo:
        limit-for-period: 1
        limit-refresh-period: 1s
        timeout-duration: 10s
      tefas:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      coingecko:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      bond:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
  retry:
    retryAspectOrder: 2
    instances:
      tefas:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.BusinessException
          - com.finance.backend.exception.ExternalApiRequestException
      tefas-bulk:
        max-attempts: 3
        wait-duration: 30s
        enable-exponential-backoff: false
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.BusinessException
          - com.finance.backend.exception.ExternalApiRequestException
      tcmb:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      coingecko:
        max-attempts: 3
        wait-duration: 3s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      yahoo:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      bond:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.BusinessException
      news:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
