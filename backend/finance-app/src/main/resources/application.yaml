spring:
  application:
    name: finance-portal-backend
  
  datasource:
    url: jdbc:postgresql://db:5432/finance_db
    username: finance_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms

  
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs

app:
  api:
    coingecko:
      base-url: https://api.coingecko.com/api/v3
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      api-key-header: x-cg-demo-api-key
    bond:
      base-url: https://evds3.tcmb.gov.tr/igmevdsms-dis
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      api-key-header: key
    yahoo:
      base-url: https://query1.finance.yahoo.com/v8/finance/chart/
      user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    binance:
      base-url: https://api.binance.com
  
  tcmb:
    base-url: ${TCMB_BASE_URL:https://www.tcmb.gov.tr}
    xml-path: /kurlar/today.xml

  tefas-api-path: /api/DB/BindHistoryInfo
  tefas-base-url: https://www.tefas.gov.tr
  timezone: Europe/Istanbul
  scale: 4

  http:
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
    default-user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

  async:
    core-pool-size: 3
    max-pool-size: 5
    queue-capacity: 25

  crypto:
    history-days: 365
    min-candles-for-healthy: 350

  bond:
    batch-size: 10
    max-days-per-request: 1000
    datagroup-code: bie_pydibs
    rate-threshold: 0.5
    auction-threshold: 14
    cpi-fixed-threshold: 5
    face-value: 100
    days-in-year: 365

  stock:
    min-candles-for-incremental: 1200
    history-years: 5

  forex:
    years-to-keep: 5
    min-candles-for-incremental: 1200
    spread-rate: 0.01

  fund:
    years-to-fetch: 5
    min-candles-for-incremental: 30
    window-sizes: 95

  news:
    max-articles-per-source: 50
    cache-ttl-hours: 24
    category-limits:
      "[CRYPTO]": 20
      "[BORSA_ISTANBUL]": 30
      "[BORSA_SIRKETLERI]": 20
      "[TAHVIL_BONO]": 20
      "[PARITE]": 20
      "[EMTIA]": 20
      "[GENEL_FINANS]": 60

  rate-limit:
    admin-trigger-limit: 20
    admin-read-limit: 20
    api-limit: 60

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      tefas:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - com.finance.backend.exception.ExternalApiRequestException
      yahoo:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      coingecko:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
      bond:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      tcmb:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
      news:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.backend.exception.ExternalApiException
  ratelimiter:
    instances:
      yahoo:
        limit-for-period: 1
        limit-refresh-period: 1s
        timeout-duration: 10s
      tefas:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      coingecko:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      bond:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
  retry:
    retryAspectOrder: 2
    instances:
      tefas:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.BusinessException
          - com.finance.backend.exception.ExternalApiRequestException
      tcmb:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      coingecko:
        max-attempts: 3
        wait-duration: 3s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      yahoo:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.SymbolNotFoundException
      bond:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.backend.exception.BusinessException
      news:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.backend.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics