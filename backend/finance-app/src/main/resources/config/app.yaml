app:
  timezone: Europe/Istanbul
  scale: 4

  demo:
    # Activates DemoSeeder on startup, which provisions a deterministic Turkish-investor portfolio
    # for the demouser account via the same service-layer commands a real user would issue. The
    # demo Docker overlay sets this to true; non-demo deployments leave it false.
    enabled: ${APP_DEMO_ENABLED:false}

  http:
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
    default-user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    evds-max-in-memory-size-mb: 10
    news-max-in-memory-size-mb: 5

  async:
    # One shared executor backs cold-start init, warm-ups, backfill and every @Async. Conservative headroom
    # so bursts queue instead of hitting AbortPolicy (RejectedExecutionException). Pool separation is the
    # real fix but out of scope here. Note: AdminTaskRunner caps concurrent admin tasks at core-pool-size.
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 200
