spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
      data-source-properties:
        reWriteBatchedInserts: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[jdbc.batch_size]': 200
        '[order_inserts]': true
        '[order_updates]': true
        '[type.json_format_mapper]': org.hibernate.type.format.jackson.Jackson3JsonFormatMapper
