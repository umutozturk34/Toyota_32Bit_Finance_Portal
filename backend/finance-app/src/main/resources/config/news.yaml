app:
  news:
    max-articles-per-source: 50
    cache-ttl-hours: 24
    default-category-limit: 20
    category-limits:
      "[CRYPTO]": 20
      "[BORSA_ISTANBUL]": 30
      "[BORSA_SIRKETLERI]": 20
      "[TAHVIL_BONO]": 20
      "[PARITE]": 20
      "[EMTIA]": 20
      "[GENEL_FINANS]": 60
    mapping:
      rich-html-min-length: 150
      short-description-threshold: 80
    classifier:
      min-score: 2
      category-bonus: 3
      substring-match-threshold: 4
