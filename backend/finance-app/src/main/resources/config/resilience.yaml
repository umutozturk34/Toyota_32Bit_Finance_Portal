resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      tefas:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
          - com.finance.shared.exception.ExternalApiRequestException
      yahoo:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.common.exception.SymbolNotFoundException
      coingecko:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
      evds:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
        ignore-exceptions:
          - com.finance.common.exception.SymbolNotFoundException
      news:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
      keycloak-admin:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - com.finance.common.exception.ExternalApiException
  ratelimiter:
    instances:
      yahoo:
        limit-for-period: 1
        limit-refresh-period: 1s
        timeout-duration: 10s
      tefas:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      coingecko:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
      evds:
        limit-for-period: 1
        limit-refresh-period: 2s
        timeout-duration: 10s
  retry:
    retryAspectOrder: 2
    instances:
      tefas:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.common.exception.BusinessException
          - com.finance.shared.exception.ExternalApiRequestException
      tefas-bulk:
        max-attempts: 3
        wait-duration: 30s
        enable-exponential-backoff: false
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.common.exception.BusinessException
          - com.finance.shared.exception.ExternalApiRequestException
      coingecko:
        max-attempts: 3
        wait-duration: 3s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      yahoo:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.common.exception.SymbolNotFoundException
      evds:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
        ignore-exceptions:
          - com.finance.common.exception.BusinessException
      news:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException
      keycloak-admin:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.finance.common.exception.ExternalApiException
          - java.net.SocketTimeoutException
          - java.net.ConnectException
          - io.netty.handler.timeout.ReadTimeoutException

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

