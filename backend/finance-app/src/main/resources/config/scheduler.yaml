app:
  scheduler:
    crypto:
      morning-cron: "0 0 9 * * *"
      afternoon-cron: "0 0 15 * * *"
      evening-cron: "0 0 21 * * *"
    stock:
      morning-cron: "0 15 10 * * MON-FRI"
      afternoon-cron: "0 15 14 * * MON-FRI"
      evening-cron: "0 15 19 * * MON-FRI"
    forex:
      daily-cron: "0 30 16 * * *"
    news:
      morning-cron: "0 0 8 * * *"
      afternoon-cron: "0 30 14 * * *"
      evening-cron: "0 30 21 * * *"
    fund:
      daily-cron: "0 30 11 * * *"
    commodity:
      morning-cron: "0 45 10 * * *"
      afternoon-cron: "0 30 16 * * *"
      evening-cron: "0 30 22 * * *"
    bond:
      daily-cron: "0 0 20 * * *"
    portfolio:
      morning-cron: "0 0 12 * * *"
      evening-cron: "0 0 23 * * *"
    macro:
      daily-cron: "0 30 17 * * *"
    beater:
      # Runs after the evening market-data refresh (the latest is commodity 22:30) so the rebuilt cache holds
      # the day's freshly fetched prices/indicators, not the previous day's. Coverage — every period × every
      # benchmark indicator — is enumerated dynamically from the catalog in code, so no period/benchmark
      # lists are configured here (a newly published indicator/period warms automatically).
      daily-cron: "0 30 23 * * *"

  task:
    max-history: 50

  tracked-asset:
    code-cache-ttl-seconds: 45
