app:
  scheduler:
    crypto:
      morning-cron: "0 0 9 * * *"
      afternoon-cron: "0 0 15 * * *"
      evening-cron: "0 0 21 * * *"
    stock:
      morning-cron: "0 15 10 * * MON-FRI"
      afternoon-cron: "0 15 14 * * MON-FRI"
      evening-cron: "0 15 19 * * MON-FRI"
    forex:
      daily-cron: "0 30 16 * * *"
    news:
      morning-cron: "0 0 8 * * *"
      afternoon-cron: "0 30 14 * * *"
      evening-cron: "0 30 21 * * *"
    fund:
      daily-cron: "0 30 11 * * *"
    commodity:
      morning-cron: "0 45 10 * * *"
      afternoon-cron: "0 30 16 * * *"
      evening-cron: "0 30 22 * * *"
    bond:
      daily-cron: "0 0 20 * * *"
    portfolio:
      morning-cron: "0 0 12 * * *"
      evening-cron: "0 0 23 * * *"
    macro:
      daily-cron: "0 30 17 * * *"
    beater:
      daily-cron: "0 0 3 * * *"
      periods: "1Y,5Y,6M,3M,1M"
      benchmarks: "TP.TUFE1YI.T1,TP.TUFE1.S00,TP.TG1.Y01"

  task:
    max-history: 50

  tracked-asset:
    code-cache-ttl-seconds: 45
