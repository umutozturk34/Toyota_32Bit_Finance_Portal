receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  memory_limiter:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 100

  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert
      - key: service.namespace
        value: finance-portal
        action: upsert

  filter/health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/actuator/health"'
        - 'attributes["url.path"] == "/actuator/health"'
    logs:
      log_record:
        - 'body == ""'

  transform/traces:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(status.code, 2) where status.code == 0 and attributes["http.status_code"] >= 500

  transform/logs:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(severity_number, 17) where IsMatch(body, "(?i)error|exception|fail")

  transform/metrics:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["service.name"], resource.attributes["service.name"]) where resource.attributes["service.name"] != nil
      - context: scope
        statements:
          - set(attributes["elastic.mapping.mode"], "ecs")

  filter/metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'name == "process.runtime.jvm.classes.loaded"'
        - 'name == "process.runtime.jvm.classes.unloaded"'
        - 'name == "process.runtime.jvm.classes.current_loaded"'

  cumulativetodelta:

exporters:
  opensearch/traces:
    http:
      endpoint: "https://opensearch:9200"
      auth:
        authenticator: basicauth
      tls:
        insecure_skip_verify: true
    traces_index: "finance-traces"

  opensearch/logs:
    http:
      endpoint: "https://opensearch:9200"
      auth:
        authenticator: basicauth
      tls:
        insecure_skip_verify: true
    logs_index: "finance-logs"

  elasticsearch/metrics:
    endpoints: ["http://opensearch-proxy:9201"]
    user: "${env:OPENSEARCH_USERNAME}"
    password: "${env:OPENSEARCH_PASSWORD}"
    metrics_index: "finance-metrics"
    discover:
      on_start: false

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  basicauth:
    client_auth:
      username: ${env:OPENSEARCH_USERNAME}
      password: ${env:OPENSEARCH_PASSWORD}

service:
  extensions: [health_check, basicauth]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/health, resource, transform/traces, batch]
      exporters: [opensearch/traces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, filter/health, resource, transform/logs, batch]
      exporters: [opensearch/logs]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, filter/metrics, resource, transform/metrics, cumulativetodelta, batch]
      exporters: [elasticsearch/metrics]