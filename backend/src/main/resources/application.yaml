spring:
  application:
    name: finance-portal-backend
  
  datasource:
    url: jdbc:postgresql://db:5432/finance_db
    username: finance_user
    password: ${DB_PASSWORD:finance_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  
  data:
    redis:
      host: redis
      port: 6379
      timeout: 60000ms

  
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs

app:
  api:
    coingecko:
      base-url: https://api.coingecko.com/api/v3
    yahoo:
      base-url: https://query1.finance.yahoo.com/v8/finance/chart/
  tcmb-xml-url: ${TCMB_XML_URL:https://www.tcmb.gov.tr/kurlar/today.xml}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health