spring:
  application:
    name: finance-portal-backend
  
  datasource:
    url: jdbc:postgresql://db:5432/finance_db
    username: finance_user
    password: ${DB_PASSWORD:finance_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: redis
      port: 6379
      timeout: 60000ms
  
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs

coingecko:
  api:
    key: ${COINGECKO_API_KEY:demo-key}

# API key loaded from environment variable (.env file)
keycloak:
  auth-server-url: http://keycloak:8080
  server-url: http://keycloak:8080
  realm: finance-realm
  admin:
    username: admin
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin123}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health