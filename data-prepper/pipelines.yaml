log-pipeline:
  source:
    kafka:
      bootstrap_servers:
        - "kafka:9092"
      encryption:
        type: none
      topics:
        - name: "finance-logs"
          group_id: "data-prepper-logs"
          auto_offset_reset: "earliest"
          auto_commit: true
          commit_interval: "PT5S"
  processor:
    - parse_json:
        source: "message"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index: "finance-logs"
        index_type: custom

notification-log-pipeline:
  source:
    kafka:
      bootstrap_servers:
        - "kafka:9092"
      encryption:
        type: none
      topics:
        - name: "notification-logs"
          group_id: "data-prepper-notification-logs"
          auto_offset_reset: "earliest"
          auto_commit: true
          commit_interval: "PT5S"
  processor:
    - parse_json:
        source: "message"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index: "notification-logs"
        index_type: custom

# Metrics: collector exports OTLP here; Data Prepper flattens the OTLP metric
# stream (with histogram bucket expansion) and writes the native name/value shape
# straight to OpenSearch, routing per serviceName. Replaces the old collector
# elasticsearch-exporter + nginx X-Elastic-Product proxy path.
metrics-pipeline:
  source:
    otel_metrics_source:
      ssl: false
      port: 21891
  processor:
    - otel_metrics:
        calculate_histogram_buckets: true
        calculate_exponential_histogram_buckets: true
  route:
    - finance-route: '/serviceName == "finance-backend"'
    - notification-route: '/serviceName == "finance-notification"'
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index: "finance-metrics"
        index_type: custom
        routes: ["finance-route"]
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index: "notification-metrics"
        index_type: custom
        routes: ["notification-route"]

# Traces: the collector now ALSO forwards spans here over OTLP (it still writes the raw
# finance-traces / notification-traces indices directly for Discover). otel_traces builds the
# otel-v1-apm-span-* index (trace list + span timeline) and service_map builds
# otel-v1-apm-service-map (the service graph) — the two indices OpenSearch Observability ->
# Trace Analytics reads. Single Data Prepper instance, so service_map needs no peer-forwarder.
otel-trace-pipeline:
  source:
    otel_trace_source:
      ssl: false
      port: 21890
  sink:
    - pipeline:
        name: "raw-trace-pipeline"
    - pipeline:
        name: "service-map-pipeline"

raw-trace-pipeline:
  source:
    pipeline:
      name: "otel-trace-pipeline"
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: trace-analytics-raw

service-map-pipeline:
  source:
    pipeline:
      name: "otel-trace-pipeline"
  processor:
    - service_map:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        insecure: true
        index_type: trace-analytics-service-map
