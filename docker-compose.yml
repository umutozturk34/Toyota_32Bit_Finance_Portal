version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: finance-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finance_db
      SPRING_DATASOURCE_USERNAME: finance_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      COINGECKO_API_KEY: ${COINGECKO_KEY}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finance-network

  # OpenLDAP Directory Server
  openldap:
    image: osixia/openldap:1.5.0
    container_name: finance-openldap
    restart: unless-stopped
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      LDAP_ORGANISATION: "Toyota Finance"
      LDAP_DOMAIN: "finance.com"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - ./ldap-init:/container/service/slapd/assets/config/bootstrap/ldif/custom
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    networks:
      - finance-network

  # phpLDAPadmin
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: finance-phpldapadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
      PHPLDAPADMIN_TRUST_PROXY_NETWORKS: "true"
      PHPLDAPADMIN_SERVER_ADMIN: "admin@finance.com"
    depends_on:
      - openldap
    networks:
      - finance-network

  # Keycloak 
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: finance-keycloak
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: finance_user
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: localhost         
      KC_PROXY: edge                  
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"         
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_PORT: "8180"
      KC_SPI_REALM_DEFAULT_SSL_REQUIRED: NONE
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-simple.json:/opt/keycloak/data/import/realm-finance.json:ro
      - ./keycloak/themes/finance:/opt/keycloak/themes/finance:ro
    depends_on:
      db:
        condition: service_healthy
      openldap:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - finance-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BIST_STOCKS=${BIST_STOCKS}
        - VITE_TRACKED_CRYPTOS=${TRACKED_CRYPTOS}
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - CHOKIDAR_USEPOLLING=true 
    depends_on:
      - backend
      - keycloak
    networks:
      - finance-network

volumes:
  postgres_data_v2:
  openldap_data:
  openldap_config:
  keycloak_data:
  redis_data:

networks:
  finance-network:
    driver: bridge