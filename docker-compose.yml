version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: finance-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finance_db
      SPRING_DATASOURCE_USERNAME: finance_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      COINGECKO_API_KEY: ${COINGECKO_KEY}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FUNDS_ALL: ${FUNDS_ALL}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: finance-backend
      OTEL_LOGS_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - finance-network

  # OpenLDAP Directory Server
  openldap:
    image: osixia/openldap:1.5.0
    container_name: finance-openldap
    restart: unless-stopped
    ports:
      - "127.0.0.1:389:389"
      - "127.0.0.1:636:636"
    environment:
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      LDAP_ORGANISATION: "Toyota Finance"
      LDAP_DOMAIN: "finance.com"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - ./ldap-init:/container/service/slapd/assets/config/bootstrap/ldif/custom
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    networks:
      - finance-network

  # phpLDAPadmin
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: finance-phpldapadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
      PHPLDAPADMIN_TRUST_PROXY_NETWORKS: "true"
      PHPLDAPADMIN_SERVER_ADMIN: "admin@finance.com"
    depends_on:
      - openldap
    networks:
      - finance-network

  # Keycloak 
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: finance-keycloak
    restart: unless-stopped
    ports:
      - "127.0.0.1:8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: finance_user
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: localhost         
      KC_PROXY: edge                  
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"         
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_PORT: "8180"
      KC_SPI_REALM_DEFAULT_SSL_REQUIRED: NONE
    command:
      - start-dev
      - --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-simple.json:/opt/keycloak/data/import/realm-finance.json:ro
      - ./keycloak/themes/finance:/opt/keycloak/themes/finance:ro
    depends_on:
      db:
        condition: service_healthy
      openldap:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - finance-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BIST_STOCKS=${BIST_STOCKS}
        - VITE_TRACKED_CRYPTOS=${TRACKED_CRYPTOS}
        - VITE_FUNDS_ALL=${FUNDS_ALL}
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - CHOKIDAR_USEPOLLING=true 
    depends_on:
      - backend
      - keycloak
    networks:
      - finance-network
# --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./backend/otel-config.yaml:/etc/otel-config.yaml
    command: ["--config=/etc/otel-config.yaml"]
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    ports:
      - "127.0.0.1:4317:4317"
    networks:
      - finance-network
    depends_on:
      - opensearch

  # --- OpenSearch Init (ISM + Dashboards) ---
  opensearch-init:
    image: alpine:3.19
    container_name: opensearch-init
    entrypoint: /bin/sh
    command: ["/setup/setup.sh"]
    volumes:
      - ./opensearch-init:/setup:ro
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    networks:
      - finance-network
    depends_on:
      - opensearch
      - opensearch-dashboards
    restart: "no"

  # --- OpenSearch (Veri Deposu) ---
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - finance-network

  # nginx proxy adding X-Elastic-Product header for go-elasticsearch v8 client
  opensearch-proxy:
    image: nginx:alpine
    container_name: opensearch-proxy
    restart: unless-stopped
    volumes:
      - ./opensearch-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - finance-network
    depends_on:
      - opensearch

  # --- OpenSearch Dashboards (Görsel Panel) ---
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - opensearch.username=${OPENSEARCH_USERNAME}
      - opensearch.password=${OPENSEARCH_PASSWORD}
      - opensearch.ssl.verificationMode=none
    ports:
      - "127.0.0.1:5601:5601"
    networks:
      - finance-network
    depends_on:
      - opensearch

volumes:
  postgres_data_v2:
  openldap_data:
  openldap_config:
  keycloak_data:
  redis_data:
  opensearch_data:

networks:
  finance-network:
    driver: bridge