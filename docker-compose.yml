services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: finance-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finance_db
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  db-migrator:
    image: flyway/flyway:11-alpine
    container_name: finance-db-migrator
    restart: "no"
    command:
      - "-url=jdbc:postgresql://db:5432/finance_db"
      - "-user=finance_user"
      - "-password=${DB_PASSWORD}"
      - "-connectRetries=10"
      - "-locations=filesystem:/flyway/sql"
      - "migrate"
    volumes:
      - ./db/migration:/flyway/sql:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finance-network

  # Spring Boot Backend
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/umutozturk34/finance-portal-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
      secrets:
        - github_token
    container_name: finance-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      TZ: Europe/Istanbul
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finance_db
      SPRING_DATASOURCE_USERNAME: finance_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      COINGECKO_API_KEY: ${COINGECKO_KEY}
      EVDS_API_KEY: ${EVDS_API_KEY}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: finance-backend
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - finance-network

  notification-backend:
    image: ${NOTIFICATION_BACKEND_IMAGE:-ghcr.io/umutozturk34/finance-portal-notification-backend:latest}
    build:
      context: .
      dockerfile: notification-backend/Dockerfile
      secrets:
        - github_token
    container_name: finance-notification-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      TZ: Europe/Istanbul
      DB_URL: jdbc:postgresql://db:5432/finance_db
      DB_USERNAME: finance_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: notification-service
      JWK_SET_URI: http://keycloak:8080/auth/realms/finance-realm/protocol/openid-connect/certs
      KEYCLOAK_BASE_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: finance-realm
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      NOTIFICATION_FROM_ADDRESS: ${NOTIFICATION_FROM_ADDRESS:-noreply@finance.local}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: finance-notification
      OTEL_LOGS_EXPORTER: none
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      SERVER_PORT: 8082
      APP_PDF_SERVICEURL: ${PDF_SERVICE_URL:-http://pdf-service:8080}
      APP_FRONTENDBASEURL: ${FRONTEND_BASE_URL:-http://localhost}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
      pdf-service:
        condition: service_healthy
    networks:
      - finance-network

  pdf-service:
    image: ${PDF_SERVICE_IMAGE:-ghcr.io/umutozturk34/finance-portal-pdf-service:latest}
    build:
      context: ./pdf-service
    container_name: finance-pdf-service
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
      NODE_ENV: production
      PORT: 8080
      PDF_IDLE_CLOSE_MS: ${PDF_IDLE_CLOSE_MS:-0}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - finance-network

  # OpenLDAP Directory Server
  openldap:
    image: osixia/openldap:1.5.0
    container_name: finance-openldap
    restart: unless-stopped
    ports:
      - "127.0.0.1:389:389"
      - "127.0.0.1:636:636"
    environment:
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
      LDAP_ORGANISATION: "Toyota Finance"
      LDAP_DOMAIN: "finance.com"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - ./ldap-init:/container/service/slapd/assets/config/bootstrap/ldif/custom
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    networks:
      - finance-network

  # phpLDAPadmin
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: finance-phpldapadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
      PHPLDAPADMIN_TRUST_PROXY_NETWORKS: "true"
      PHPLDAPADMIN_SERVER_ADMIN: "admin@finance.com"
    depends_on:
      - openldap
    networks:
      - finance-network

  # Keycloak 
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: finance-keycloak
    restart: unless-stopped
    ports:
      - "127.0.0.1:8180:8080"
    environment:
      TZ: Europe/Istanbul
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      FINANCE_ADMIN_PASSWORD: ${FINANCE_ADMIN_PASSWORD}
      
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: finance_user
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_PROXY: edge
      KC_HTTP_RELATIVE_PATH: /auth
      # Frontend URL Keycloak announces in redirect_uri / iss / issuer — must match the
      # public origin browsers see. Falls back to localhost for local dev; on VDS set
      # VITE_KEYCLOAK_URL=https://your-domain/auth in .env so login redirects come back
      # to the real host instead of localhost.
      KC_HOSTNAME_URL: ${VITE_KEYCLOAK_URL:-http://localhost/auth}
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_SPI_REALM_DEFAULT_SSL_REQUIRED: NONE
      # SMTP for Keycloak account emails (verify / 2FA / reset) — same vars that drive the app's
      # mail, so one .env switches both from Mailpit to a real provider. Defaults keep Mailpit.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      NOTIFICATION_FROM_ADDRESS: ${NOTIFICATION_FROM_ADDRESS:-noreply@finance.com}
      # Public frontend URL — referenced by realm-*.json for redirectUris / webOrigins
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
    command:
      - start-dev
      - --import-realm
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
      - --spi-required-action-VERIFY_EMAIL_CODE-code-length=6
      - --spi-required-action-VERIFY_EMAIL_CODE-code-symbols=0123456789
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-simple.json:/opt/keycloak/data/import/realm-finance.json:ro
      - ./keycloak/themes/finance:/opt/keycloak/themes/finance:ro
      - ./keycloak/providers:/opt/keycloak/providers:ro
    depends_on:
      db:
        condition: service_healthy
      openldap:
        condition: service_started
    networks:
      - finance-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: finance-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - finance-network

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/umutozturk34/finance-portal-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_KEYCLOAK_URL=${VITE_KEYCLOAK_URL}
        - VITE_KEYCLOAK_REALM=${VITE_KEYCLOAK_REALM}
        - VITE_KEYCLOAK_CLIENT_ID=${VITE_KEYCLOAK_CLIENT_ID}
    container_name: finance-frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
      - keycloak
    networks:
      - finance-network

  gateway:
    image: nginx:1.27-alpine
    container_name: finance-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ORIGIN_CERT_CN: ${ORIGIN_CERT_CN:-localhost}
    entrypoint: ["sh", "/finport-init.sh"]
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/finport-init.sh:/finport-init.sh:ro
      - ./gateway/certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
      - notification-backend
      - keycloak
    networks:
      - finance-network
      
# --- Kafka (KRaft mode - no Zookeeper) ---
  kafka:
    image: apache/kafka:3.9.0
    container_name: finance-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      CLUSTER_ID: "finance-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - finance-network

  # --- Data Prepper (Kafka → OpenSearch) ---
  data-prepper:
    image: opensearchproject/data-prepper:latest
    container_name: finance-data-prepper
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./data-prepper/pipelines.yaml:/tmp/pipelines.template.yaml:ro
      - ./data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
      - ./data-prepper/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_started
    networks:
      - finance-network

# --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml
    command: ["--config=/etc/otel-config.yaml"]
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    expose:
      - "4317"
    networks:
      - finance-network
    depends_on:
      - opensearch

  # --- OpenSearch Init (ISM + Dashboards) ---
  opensearch-init:
    image: alpine:3.19
    container_name: opensearch-init
    entrypoint: /bin/sh
    command: ["/setup/setup.sh"]
    volumes:
      - ./opensearch-init:/setup:ro
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    networks:
      - finance-network
    depends_on:
      - opensearch
      - opensearch-dashboards
    restart: "no"

  # --- OpenSearch (Veri Deposu) ---
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - finance-network

  # nginx proxy adding X-Elastic-Product header for go-elasticsearch v8 client
  opensearch-proxy:
    image: nginx:alpine
    container_name: opensearch-proxy
    restart: unless-stopped
    volumes:
      - ./opensearch-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - finance-network
    depends_on:
      - opensearch

  # --- OpenSearch Dashboards (Görsel Panel) ---
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - opensearch.username=${OPENSEARCH_USERNAME}
      - opensearch.password=${OPENSEARCH_PASSWORD}
      - opensearch.ssl.verificationMode=none
    ports:
      - "127.0.0.1:5601:5601"
    networks:
      - finance-network
    depends_on:
      - opensearch
      
  sonar-db:
    image: postgres:15-alpine
    container_name: finance-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - finance-network
    profiles:
      - quality
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    container_name: finance-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - finance-network
    profiles:
      - quality

volumes:
  postgres_data_v2:
  openldap_data:
  openldap_config:
  keycloak_data:
  redis_data:
  opensearch_data:
  kafka_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:

networks:
  finance-network:
    driver: bridge

secrets:
  github_token:
    environment: GITHUB_TOKEN