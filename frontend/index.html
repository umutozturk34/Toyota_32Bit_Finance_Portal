<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet" />
    <title>Finance Portal</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('finance-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
        } catch (_) { /* localStorage unavailable */ }
      })();
      window.__SCROLL_RESTORE_KEY__ = 'scroll-pos:' + location.pathname;
      window.addEventListener('DOMContentLoaded', function () {
        try {
          var raw = sessionStorage.getItem(window.__SCROLL_RESTORE_KEY__);
          if (!raw) return;
          var pos = JSON.parse(raw);
          if (!pos || typeof pos.y !== 'number' || pos.y <= 0) return;
          if (typeof pos.h === 'number' && pos.h > 0) {
            document.body.style.minHeight = pos.h + 'px';
          }
          window.scrollTo(0, pos.y);
          window.__SCROLL_RESTORE_TARGET__ = pos.y;
        } catch (_) { /* ignore */ }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
