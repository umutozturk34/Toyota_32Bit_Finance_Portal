<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F6FB" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e0e14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700;6..12,800;6..12,900&display=swap" rel="stylesheet" />
    <title>Finance Portal</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0e0e14; }
      html[data-theme="light"], html[data-theme="light"] body { background: #F2F6FB; }
      #app-boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0e0e14; z-index: 9999;
      }
      html[data-theme="light"] #app-boot { background: #F2F6FB; }
      #app-boot .spinner {
        width: 36px; height: 36px; border-radius: 50%;
        border: 2px solid rgba(99,102,241,0.18); border-top-color: #6366f1;
        animation: app-boot-spin 0.9s linear infinite;
      }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      (function () {
        // Resolve initial theme before first paint so Android Chrome's auto-dark
        // (force-darken) honors our declared color-scheme instead of overriding it.
        var theme;
        try {
          var stored = localStorage.getItem('finance-theme');
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          }
        } catch (_) { /* localStorage unavailable */ }
        if (!theme) {
          try {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          } catch (_) { theme = 'dark'; }
        }
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        // Inline color-scheme guarantees the browser sees the declaration before any CSS loads,
        // disabling force-darken on light theme and force-lighten on dark theme.
        root.style.colorScheme = theme;
      })();
      window.__SCROLL_RESTORE_KEY__ = 'scroll-pos:' + location.pathname;
      window.addEventListener('DOMContentLoaded', function () {
        try {
          var raw = sessionStorage.getItem(window.__SCROLL_RESTORE_KEY__);
          if (!raw) return;
          var pos = JSON.parse(raw);
          if (!pos || typeof pos.y !== 'number' || pos.y <= 0) return;
          if (typeof pos.h === 'number' && pos.h > 0) {
            document.body.style.minHeight = pos.h + 'px';
          }
          window.scrollTo(0, pos.y);
          window.__SCROLL_RESTORE_TARGET__ = pos.y;
        } catch (_) { /* ignore */ }
      });
    </script>
  </head>
  <body>
    <div id="app-boot" aria-hidden="true"><div class="spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
