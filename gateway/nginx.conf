limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=kc_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=200r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

limit_req_status 429;
limit_conn_status 429;
limit_req_log_level warn;

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    server_name localhost;

    server_tokens off;
    limit_conn conn_per_ip 50;

    client_max_body_size 12m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json image/svg+xml;

    # --- Keycloak (served under /auth via KC_HTTP_RELATIVE_PATH) ---
    location /auth/ {
        limit_req zone=kc_limit burst=50 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $keycloak_upstream http://keycloak:8080;
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
    }

    # --- API docs / swagger ---
    location /swagger-ui {
        limit_req zone=api_limit burst=20 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        limit_req zone=api_limit burst=20 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth-sensitive backend endpoints (stricter rate limit) ---
    location ~ ^/api/v1/(auth|users/me/credentials|users/me/2fa|users/me/email)(/.*)?$ {
        limit_req zone=auth_limit burst=10 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $auth_upstream http://backend:8080;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # --- Notification SSE stream (no buffering, long-lived) ---
    location = /api/v1/notifications/stream {
        resolver 127.0.0.11 valid=10s;
        set $notification_upstream http://notification-backend:8082;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # --- Notification-backend endpoints ---
    location ~ ^/api/v1/(notifications|notification-preferences|price-alerts|watchlists|reports|messages|admin/messages|admin/notifications|market-status)(/.*)?$ {
        limit_req zone=api_limit burst=100 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $notification_upstream http://notification-backend:8082;
        proxy_pass $notification_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # --- Main backend API ---
    location /api {
        limit_req zone=api_limit burst=100 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA static (served by the frontend container) ---
    location / {
        limit_req zone=static_limit burst=200 nodelay;
        resolver 127.0.0.11 valid=10s;
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
