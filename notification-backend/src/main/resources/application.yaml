server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: finance-notification

  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[jdbc.batch_size]': 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_notification
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://keycloak:8080/realms/finance-realm/protocol/openid-connect/certs}

  mail:
    host: ${SPRING_MAIL_HOST:mailpit}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        '[spring.deserializer.key.delegate.class]': org.apache.kafka.common.serialization.StringDeserializer
        '[spring.deserializer.value.delegate.class]': org.springframework.kafka.support.serializer.JsonDeserializer
        '[spring.json.trusted.packages]': com.finance.common.event,com.finance.notification.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        '[enable.idempotence]': true
      retries: 5
    listener:
      ack-mode: MANUAL_IMMEDIATE

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    oauth2-redirect-url: ${SWAGGER_OAUTH2_REDIRECT:http://localhost:8082/swagger-ui/oauth2-redirect.html}
    oauth:
      client-id: finance-frontend
      use-pkce-with-authorization-code-grant: true

notification:
  from-address: ${NOTIFICATION_FROM_ADDRESS:noreply@finance.local}
  market-hours:
    # Schedule must stay in sync with main backend cron entries (MarketScheduler).
    # Holidays are intentionally out of scope for v0.15 — sessions go by weekday only.
    markets:
      STOCK:
        open: '10:00'
        close: '18:00'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY]
        zone: Europe/Istanbul
      FOREX:
        open: '09:00'
        close: '17:00'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY]
        zone: Europe/Istanbul
      FUND:
        open: '09:30'
        close: '13:30'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY]
        zone: Europe/Istanbul
      BOND:
        open: '09:30'
        close: '17:30'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY]
        zone: Europe/Istanbul
      COMMODITY:
        open: '01:00'
        close: '23:59'
        trading-days: [SUNDAY, MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY]
        zone: Europe/Istanbul
      # 24/7 markets — open=close sentinel triggers always-open bypass in resolver
      NEWS:
        open: '00:00'
        close: '00:00'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
        zone: Europe/Istanbul
      CRYPTO:
        open: '00:00'
        close: '00:00'
        trading-days: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
        zone: Europe/Istanbul

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://keycloak:8080}
  realm: ${KEYCLOAK_REALM:finance-realm}
  admin-user: ${KEYCLOAK_ADMIN_USER:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
