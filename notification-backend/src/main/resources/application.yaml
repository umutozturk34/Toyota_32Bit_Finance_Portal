spring:
  application:
    name: finance-notification
  config:
    import:
      - classpath:config/database.yaml
      - classpath:config/security.yaml
      - classpath:config/cache.yaml
      - classpath:config/kafka.yaml
      - classpath:config/mail.yaml
      - classpath:config/notification.yaml
      - classpath:config/market-hours.yaml
      - classpath:config/slot.yaml
      - classpath:config/api.yaml
      - classpath:config/management.yaml

app:
  pdf:
    serviceUrl: ${PDF_SERVICE_URL:http://pdf-service:8080}
    requestTimeoutMs: ${PDF_REQUEST_TIMEOUT_MS:30000}
  frontendBaseUrl: ${FRONTEND_BASE_URL:http://localhost:5173}
