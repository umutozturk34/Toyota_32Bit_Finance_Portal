spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: latest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        '[spring.deserializer.key.delegate.class]': org.apache.kafka.common.serialization.StringDeserializer
        '[spring.deserializer.value.delegate.class]': org.springframework.kafka.support.serializer.JsonDeserializer
        '[spring.json.trusted.packages]': com.finance.common.event,com.finance.notification.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        '[enable.idempotence]': true
      retries: 5
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:1}

app:
  kafka:
    topics:
      market-updated: market.updated
      news-published: news.published
      portfolio-updated: portfolio.updated
      macro-indicators-updated: macro.indicators.updated
      user-email-change-code: user.email-change.code-requested
      mail-dispatch: mail.dispatch
