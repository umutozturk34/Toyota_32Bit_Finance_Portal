spring:
  mail:
    host: ${SPRING_MAIL_HOST:mailpit}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
          # Fail a hung SMTP send fast (well under reclaim-after PT5M) so it retries via
          # handleFailure instead of being reclaimed and re-sent — avoids duplicate emails.
          connectiontimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:10000}
          timeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:30000}
          writetimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:30000}

notification:
  from-address: ${NOTIFICATION_FROM_ADDRESS:noreply@finance.local}
  email:
    outbox:
      batch-size: 200
      max-attempts: 5
      backoffs:
        - PT1M
        - PT5M
        - PT30M
        - PT2H
        - PT12H
      reclaim-after: PT5M
      sent-retention: P7D
      poll-delay: PT10S
      reclaim-delay: PT1M
      cleanup-cron: "0 0 3 * * *"

resilience4j:
  circuitbreaker:
    instances:
      smtp:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
