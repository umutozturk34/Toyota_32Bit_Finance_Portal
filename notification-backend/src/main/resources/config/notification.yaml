notification:
  kafka:
    consumer:
      retry-interval-ms: 2000
      retry-max-attempts: 3
  cache:
    dedup-max-entries: 50000
    session-tracker-max-markets: 64
  stream:
    emitter-timeout-ms: 0
  dispatch:
    formatting:
      fraction-digits-large: 2
      fraction-digits-small: 6
      change-percent-scale: 6
    watchlist-delta:
      body-preview-items: 3
    fanout:
      page-size: 200
  market-session:
    lookahead-days: 14
    status-read-capacity-per-minute: 240
  watchlist:
    max-per-user: 20
  async:
    sse:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 1000
      await-termination-seconds: 30
      thread-name-prefix: notif-sse-
