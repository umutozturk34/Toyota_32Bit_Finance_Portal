notification:
  kafka:
    consumer:
      retry-interval-ms: 2000
      retry-max-attempts: 3
  cache:
    dedup-max-entries: 50000
    session-tracker-max-markets: 64
    dedup-ttl-hours: 24
    session-tracker-ttl-hours: 24
    keycloak-profile-max-size: 2000
    keycloak-profile-ttl-minutes: 15
  stream:
    emitter-timeout-ms: 0
    registry-ttl-minutes: 30
    registry-max-users: 10000
  dispatch:
    formatting:
      fraction-digits-large: 2
      fraction-digits-small: 6
      change-percent-scale: 6
    watchlist-delta:
      body-preview-items: 3
    fanout:
      page-size: 200
    news-digest:
      recent-window-minutes: 60
      sample-title-limit: 3
  market-session:
    lookahead-days: 14
    status-read-capacity-per-minute: 240
  watchlist:
    max-per-user: 20
    max-items-per-list: 100
  alert:
    max-per-user: 50
  async:
    sse:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 1000
      await-termination-seconds: 30
      thread-name-prefix: notif-sse-
