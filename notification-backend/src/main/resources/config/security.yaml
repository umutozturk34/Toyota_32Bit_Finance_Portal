spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://keycloak:8080/auth/realms/finance-realm/protocol/openid-connect/certs}

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://keycloak:8080/auth}
  realm: ${KEYCLOAK_REALM:finance-realm}
  admin-user: ${KEYCLOAK_ADMIN_USER:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  user-status:
    cache-ttl-seconds: 15
    cache-max-size: 2000
    admin-role: ADMIN

app:
  security:
    cors:
      allowed-origin-patterns:
        - http://localhost
        - http://localhost:*
        - http://127.0.0.1
        - http://127.0.0.1:*
        - ${FRONTEND_BASE_URL:http://localhost}
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      allowed-headers:
        - Authorization
        - Content-Type
        - Cache-Control
        - X-Requested-With
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age-seconds: 3600
