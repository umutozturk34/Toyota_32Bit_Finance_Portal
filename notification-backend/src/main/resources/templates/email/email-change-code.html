<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      th:replace="~{email/_layout :: layout(eyebrow=#{appEmail.changeCode.eyebrow}, title=#{appEmail.changeCode.title}, subtitle=#{appEmail.changeCode.subtitle(${newEmail})}, content=~{::content})}">
<body>
<th:block th:fragment="content">
    <p th:style="'margin:0 0 14px;color:' + ${cFg} + ';font-size:14px;'" th:text="#{appEmail.changeCode.body1}">Body</p>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top:18px;">
        <tr>
            <td class="code-cell" th:style="'background:' + ${cInfoBg} + ';border:1px solid ' + ${cBorder} + ';border-radius:14px;padding:22px 16px;text-align:center;'">
                <p th:style="'margin:0 0 10px;font-size:10px;font-weight:700;letter-spacing:2px;color:' + ${cMuted} + ';text-transform:uppercase;'" th:text="#{appEmail.codeEyebrow}">one-time code</p>
                <span class="num code-value" th:style="'display:inline-block;font-size:34px;font-weight:600;letter-spacing:9px;line-height:1;padding-left:9px;color:' + ${cFg} + ';'" th:text="${code}">000000</span>
            </td>
        </tr>
    </table>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top:18px;">
        <tr>
            <td class="info-cell" th:style="'padding:14px 18px;background:' + ${cInfoBg} + ';border:1px solid ' + ${cBorder} + ';border-radius:12px;'">
                <p th:style="'margin:0 0 6px;font-size:12.5px;color:' + ${cMuted} + ';line-height:1.65;'">
                    <strong th:style="'color:' + ${cFg} + ';'" th:text="#{appEmail.expiryLabel}">Validity</strong> &nbsp;
                    <span th:text="#{appEmail.changeCode.expiryPrefix}">The code expires in</span>
                    <span class="num" th:style="'background:' + ${cInfoCode} + ';color:' + ${cFg} + ';padding:2px 8px;border-radius:5px;font-size:12px;'" th:text="${minutesLeft}">10</span>
                    <span th:text="#{appEmail.changeCode.expirySuffix}">minutes.</span>
                </p>
                <p th:style="'margin:0;font-size:12.5px;color:' + ${cMuted} + ';line-height:1.65;'">
                    <strong th:style="'color:' + ${cFg} + ';'" th:text="#{appEmail.changeCode.newAddressLabel}">New address</strong> &nbsp;
                    <span class="num" th:style="'color:' + ${cFg} + ';'" th:text="${newEmail}">new@address.com</span>
                </p>
            </td>
        </tr>
    </table>

    <p th:style="'margin:18px 0 0;font-size:13px;line-height:1.7;color:' + ${cMuted} + ';'" th:utext="#{appEmail.changeCode.footer}">Footer</p>
</th:block>
</body>
</html>
