<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr"
      th:replace="~{email/_layout :: layout(eyebrow='FİYAT ALARMI', title=${assetName}, subtitle=${assetCodeUpper + ' · ' + marketLabel + ' · alarm tetiklendi'}, content=~{::content})}">
<body>
<th:block th:fragment="content"
          th:with="cSuccess=${dark ? '#34d399' : '#059669'},
                   cDanger=${dark ? '#f87171' : '#dc2626'},
                   cChange=${isUp ? cSuccess : cDanger},
                   cChangeBg=${isUp ? (dark ? '#0e2d24' : '#d1fae5') : (dark ? '#3a0f12' : '#fee2e2')}">

    <p th:style="'margin:0 0 6px;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:' + ${cSubtle} + ';'">Anlık Fiyat</p>
    <p class="num" th:style="'margin:0;font-size:30px;font-weight:700;letter-spacing:-0.4px;line-height:1.1;color:' + ${cFg} + ';'"
       th:text="${priceFormatted}">₺3.674.497,00</p>
    <p th:if="${changePercent != null}" class="num"
       th:style="'margin:8px 0 0;font-size:13px;font-weight:600;color:' + ${cChange} + ';'">
        <span th:text="${isUp ? '▲' : '▼'}">▲</span>
        <span th:text="${changePercent}">+0,40%</span>
        <span th:style="'font-weight:400;color:' + ${cSubtle} + ';'">eşiğe göre</span>
    </p>

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin-top:22px;">
        <tr>
            <td th:style="'padding:14px 18px;background:' + ${cInfoBg} + ';border:1px solid ' + ${cBorder} + ';border-radius:12px;'">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                    <tr>
                        <td style="padding:5px 0;"><span th:style="'font-size:12.5px;color:' + ${cMuted} + ';'">Eşik</span></td>
                        <td align="right" style="padding:5px 0;"><span class="num" th:style="'font-size:13.5px;font-weight:600;color:' + ${cFg} + ';'" th:text="${thresholdFormatted}">₺3.660.000,00</span></td>
                    </tr>
                    <tr>
                        <td style="padding:5px 0;"><span th:style="'font-size:12.5px;color:' + ${cMuted} + ';'">Tetik</span></td>
                        <td align="right" style="padding:5px 0;"><span th:style="'font-size:13.5px;font-weight:600;padding:3px 10px;border-radius:999px;background:' + ${cChangeBg} + ';color:' + ${cChange} + ';'" th:text="${directionLabel}">Eşiğin üstüne</span></td>
                    </tr>
                    <tr>
                        <td style="padding:5px 0;"><span th:style="'font-size:12.5px;color:' + ${cMuted} + ';'">Varlık</span></td>
                        <td align="right" style="padding:5px 0;"><span class="num" th:style="'font-size:13.5px;font-weight:600;color:' + ${cFg} + ';'" th:text="${assetCodeUpper + ' · ' + marketLabel}">BTC · Kripto</span></td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top:20px;">
        <tr>
            <td th:style="'background:' + ${cAccent} + ';background-image:linear-gradient(135deg,' + ${cAccent} + ' 0%,' + ${cAccentMid} + ' 50%,' + ${cAccent2} + ' 100%);border-radius:10px;box-shadow:0 6px 22px -4px rgba(99,102,241,0.45);'">
                <a href="http://localhost/watch" style="display:inline-block;padding:14px 28px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:0.2px;line-height:1;">
                    Takip listemi aç &nbsp;→
                </a>
            </td>
        </tr>
    </table>

    <p th:style="'margin:18px 0 0;font-size:12.5px;color:' + ${cSubtle} + ';line-height:1.65;'">Bu alarm tek seferlik tetiklenir; pasif alarmı yeniden aktifleştirmek için takip listene git.</p>
</th:block>
</body>
</html>
