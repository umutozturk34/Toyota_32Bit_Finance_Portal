<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem duyurusu</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
        .card { max-width: 560px; margin: 0 auto; border-radius: 12px; padding: 32px; }
        .title { font-size: 20px; margin: 0 0 16px; }
        .body { line-height: 1.6; white-space: pre-wrap; }
        .footer { margin: 32px 0 0; font-size: 12px; }
    </style>
    <style th:if="${theme == 'LIGHT'}">
        body { background: #f5f7fb; color: #1a1d24; }
        .card { background: #ffffff; border: 1px solid #e5e9f0; }
        .title { color: #7c3aed; }
        .footer { color: #8b94a3; }
    </style>
    <style th:unless="${theme == 'LIGHT'}">
        body { background: #0b0d12; color: #d8dde6; }
        .card { background: #11141b; border: 1px solid #1f242e; }
        .title { color: #a78bfa; }
        .footer { color: #5f6671; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title" th:text="${title}">Sistem duyurusu</h1>
        <div class="body" th:text="${body}">Mesaj içeriği</div>
        <p class="footer">
            Bu duyuruyu Finance Portal yöneticileri gönderdi.
        </p>
    </div>
</body>
</html>
