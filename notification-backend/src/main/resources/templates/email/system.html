<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      th:replace="~{email/_layout :: layout(eyebrow=#{appEmail.system.eyebrow}, title=${title}, subtitle=#{appEmail.system.subtitle}, content=~{::content})}">
<body>
<th:block th:fragment="content">
    <p th:style="'margin:0 0 14px;color:' + ${cFg} + ';font-size:14px;'" th:text="#{appEmail.system.lead}">Lead</p>
    <div th:style="'margin:14px 0 0;padding:18px 22px;background:' + ${cInfoBg} + ';border:1px solid ' + ${cBorder} + ';border-radius:12px;line-height:1.7;white-space:pre-wrap;color:' + ${cFg} + ';font-size:14px;'"
         th:text="${body}">Body content goes here.</div>
</th:block>
</body>
</html>
