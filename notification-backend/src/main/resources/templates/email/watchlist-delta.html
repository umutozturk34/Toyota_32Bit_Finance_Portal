<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Takip listesi hareketi</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px; margin: 0; }
        .card { max-width: 560px; margin: 0 auto; border-radius: 12px; padding: 32px; }
        .title { font-size: 18px; margin: 0 0 16px; }
        .row { margin: 0 0 8px; }
        .label { font-weight: normal; }
        .value { font-weight: 600; }
        .footer { margin: 24px 0 0; font-size: 12px; }
    </style>
    <style th:if="${theme == 'LIGHT'}">
        body { background: #f5f7fb; color: #1a1d24; }
        .card { background: #ffffff; border: 1px solid #e5e9f0; }
        .title { color: #7c3aed; }
        .label { color: #5f6671; }
        .value { color: #1a1d24; }
        .accent { color: #7c3aed; }
        .footer { color: #8b94a3; }
    </style>
    <style th:unless="${theme == 'LIGHT'}">
        body { background: #0b0d12; color: #d8dde6; }
        .card { background: #11141b; border: 1px solid #1f242e; }
        .title { color: #a78bfa; }
        .label { color: #8b94a3; }
        .value { color: #d8dde6; }
        .accent { color: #a78bfa; }
        .footer { color: #5f6671; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title"><span th:text="${assetCode}">BTC</span> hareket etti</h1>
        <p class="row"><span class="label">Anlık fiyat:</span>
            <span class="value" th:text="${currentPrice}">102500</span></p>
        <p class="row"><span class="label">% değişim:</span>
            <span class="value accent" th:text="${deltaPercent}">5.2</span></p>
        <p class="footer">
            Bu bildirimi takip listenizde tanımlı eşik üstündeki değişimler için aldınız.
        </p>
    </div>
</body>
</html>
