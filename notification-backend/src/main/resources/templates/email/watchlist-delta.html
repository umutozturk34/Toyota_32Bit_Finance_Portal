<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      th:replace="~{email/_layout :: layout(eyebrow=#{appEmail.watchlistDelta.eyebrow}, title=#{appEmail.watchlistDelta.title(${watchlistName})}, subtitle=#{appEmail.watchlistDelta.subtitle(${marketLabel}, ${itemCount})}, content=~{::content})}">
<body>
<th:block th:fragment="content"
          th:with="cSuccess=${dark ? '#34d399' : '#059669'},
                   cDanger=${dark ? '#f87171' : '#dc2626'}">
    <p th:style="'margin:0 0 16px;color:' + ${cFg} + ';font-size:14px;'" th:text="#{appEmail.watchlistDelta.lead}">Lead</p>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <th:block th:each="item, iter : ${items}">
            <tr>
                <td th:style="'padding:14px;background:' + ${cInfoBg} + ';border:1px solid ' + ${cBorder} + ';border-radius:12px;'">
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                        <tr>
                            <td th:if="${item.image != null}" width="54" style="padding:0 14px 0 0;vertical-align:middle;">
                                <img th:src="${item.image}" alt="" width="40" height="40"
                                     th:style="'display:block;width:40px;height:40px;border-radius:50%;border:1px solid ' + ${cBorder} + ';background:' + ${cBg} + ';'"/>
                            </td>
                            <td style="vertical-align:middle;">
                                <p th:style="'margin:0;font-size:14px;font-weight:600;color:' + ${cFg} + ';'" th:text="${item.assetName}">Bitcoin</p>
                                <p class="num" th:style="'margin:2px 0 0;font-size:11px;color:' + ${cMuted} + ';'" th:text="${item.assetCodeUpper}">BTC</p>
                            </td>
                            <td align="right" style="vertical-align:middle;">
                                <p class="num" th:style="'margin:0;font-size:14px;font-weight:700;color:' + ${cFg} + ';'" th:text="${item.priceFormatted}">₺3.674.497,00</p>
                                <p class="num" th:style="'margin:3px 0 0;font-size:12px;font-weight:600;color:' + (${item.isUp} ? ${cSuccess} : ${cDanger}) + ';'">
                                    <span th:text="${item.isUp ? '▲' : '▼'}">▲</span>
                                    <span th:text="${item.deltaFormatted}">+5,20%</span>
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr th:if="${!iter.last}"><td style="height:10px;line-height:0;font-size:0;">&nbsp;</td></tr>
        </th:block>
    </table>

    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top:22px;">
        <tr>
            <td th:style="'background:' + ${cAccent} + ';background-image:linear-gradient(135deg,' + ${cAccent} + ' 0%,' + ${cAccentMid} + ' 50%,' + ${cAccent2} + ' 100%);border-radius:10px;box-shadow:0 6px 22px -4px rgba(99,102,241,0.45);'">
                <a href="http://localhost/watch" style="display:inline-block;padding:14px 28px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:0.2px;line-height:1;" th:text="#{appEmail.watchlistDelta.cta}">Open watchlist</a>
            </td>
        </tr>
    </table>
</th:block>
</body>
</html>
