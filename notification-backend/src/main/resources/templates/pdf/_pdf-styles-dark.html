<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body>
<style th:fragment="pdfStyles">
    @page { size: A4; margin: 16mm 14mm 18mm 14mm; background: #0F172A; }
    body { font-family: Helvetica, Arial, sans-serif; color: #F1F5F9; background: #0F172A;
           font-size: 9pt; line-height: 1.45; margin: 0; padding: 0; }
    h1 { font-size: 18pt; color: #F1F5F9; margin: 0 0 6pt 0; font-weight: 700; }
    h2 { font-size: 12pt; color: #F1F5F9; margin: 14pt 0 6pt 0; font-weight: 700;
         border-bottom: 1pt solid #4F46E5; padding-bottom: 3pt; }
    .muted { color: #94A3B8; }
    .accent { color: #818CF8; }
    .gain { color: #10B981; }
    .loss { color: #EF4444; }
    table.header { width: 100%; border-collapse: collapse; margin-bottom: 8pt; }
    table.header td { vertical-align: middle; }
    .brand-box { width: 36pt; height: 36pt; background: #6366F1;
                 color: #fff; text-align: center; font-weight: 700; font-size: 16pt; padding-top: 6pt; }
    table.summary { width: 100%; border-collapse: separate; border-spacing: 8pt 0; margin-top: 6pt; }
    table.summary td { width: 25%; border: 1pt solid #4F46E5;
                       padding: 8pt 10pt; background: #1E293B; vertical-align: top; }
    .kpi-label { font-size: 8pt; color: #94A3B8; margin-bottom: 3pt; text-transform: uppercase;
                 letter-spacing: 0.5pt; }
    .kpi-value { font-size: 12pt; font-weight: 700; color: #F1F5F9; }
    .kpi-pct { font-size: 9pt; font-weight: 600; margin-left: 4pt; }
    .chart-card { border: 1pt solid #4F46E5; padding: 8pt; background: #FFFFFF; margin-top: 6pt; }
    .chart-card img { width: 100%; height: auto; }
    table.positions { width: 100%; border-collapse: collapse; margin-top: 6pt; font-size: 8.5pt; }
    table.positions th { background: #1E293B; color: #F1F5F9; text-align: left;
                         padding: 5pt 6pt; border-bottom: 1pt solid #6366F1; font-weight: 700; }
    table.positions td { padding: 4pt 6pt; border-bottom: 1pt solid #334155; }
    table.positions tr:nth-child(even) td { background: #16213A; }
    .num { font-family: Courier, monospace; text-align: right; }
    .footer-disc { font-size: 7.5pt; color: #64748B;
                   border-top: 0.5pt solid #334155; padding-top: 4pt; margin-top: 14pt; }
</style>
</body>
</html>
