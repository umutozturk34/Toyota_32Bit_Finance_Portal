receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      # Micrometer (spring-boot apps) pushes OTLP/HTTP here; the OTel java agent still
      # uses gRPC above. Both land in the single metrics pipeline → Data Prepper.
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # Tail-based sampling: an UNSAMPLED span firehose ballooned the APM index to ~12M docs/day and pinned the
  # OpenSearch node. In PRODUCTION we must NEVER drop an error or a slow trace (those are exactly the ones you
  # debug), so instead of a blind 10% we KEEP 100% of error traces + 100% of slow (>1s) traces and sample only
  # the fast happy-path at 10%. Accurate latency percentiles/SLOs come from the (unsampled) Micrometer METRICS
  # pipeline — not these traces, which now lean slow by design. Single-collector, so tail_sampling sees every
  # span of a trace; decision_wait buffers each trace until it is complete before deciding keep/drop.
  tail_sampling:
    decision_wait: 10s
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: slow
        type: latency
        latency:
          threshold_ms: 1000
      - name: baseline
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

  memory_limiter:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 100

  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert
      - key: service.namespace
        value: finance-portal
        action: upsert

  # Auto-detect host/OS resource attributes so every metric & span carries them as fields. Without this,
  # docs only had service.name/namespace/environment — os.type, os.description, host.name and host.arch
  # were missing. override:false keeps any attribute a source already set.
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false
    system:
      resource_attributes:
        os.type:
          enabled: true
        os.description:
          enabled: true
        host.name:
          enabled: true
        host.arch:
          enabled: true

  filter/health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/actuator/health"'
        - 'attributes["url.path"] == "/actuator/health"'
        # Long-lived SSE streams (notification bell, admin task panel) stay OPEN for minutes by design, so the
        # auto-instrumentation records ONE multi-minute span per connection. Left in, they masquerade as
        # "436s requests" and produce the p99/latency spikes — drop them so APM reflects REAL request latency.
        - 'IsMatch(attributes["url.path"], "^/api/v1/(notifications|admin/tasks)/stream")'
        - 'IsMatch(attributes["http.target"], "^/api/v1/(notifications|admin/tasks)/stream")'

  transform/traces:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(status.code, 2) where status.code == 0 and attributes["http.status_code"] >= 500

  filter/metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'name == "process.runtime.jvm.classes.loaded"'
        - 'name == "process.runtime.jvm.classes.unloaded"'
        - 'name == "process.runtime.jvm.classes.current_loaded"'

  cumulativetodelta:

connectors:
  routing/traces:
    default_pipelines: [traces/finance]
    error_mode: ignore
    table:
      - context: resource
        condition: 'attributes["service.name"] == "finance-notification"'
        pipelines: [traces/notification]

exporters:
  opensearch/traces-finance:
    http:
      endpoint: "https://opensearch:9200"
      auth:
        authenticator: basicauth
      tls:
        insecure_skip_verify: true
    traces_index: "finance-traces"

  opensearch/traces-notification:
    http:
      endpoint: "https://opensearch:9200"
      auth:
        authenticator: basicauth
      tls:
        insecure_skip_verify: true
    traces_index: "notification-traces"

  # Metrics now flow to Data Prepper (native OpenSearch sink) instead of the old
  # elasticsearch exporter + nginx X-Elastic-Product proxy. Data Prepper emits the
  # OTLP name/value metric shape and routes per serviceName into the
  # finance-metrics / notification-metrics indices.
  otlp/dataprepper:
    endpoint: data-prepper:21891
    tls:
      insecure: true

  # Traces are ALSO forwarded to Data Prepper (otel_trace_source on 21890) so it can build the
  # Trace Analytics indices (otel-v1-apm-span-* + service map). The opensearch/traces-* exporters
  # above keep writing the raw finance-traces / notification-traces indices for Discover.
  otlp/dataprepper-traces:
    endpoint: data-prepper:21890
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  basicauth:
    client_auth:
      username: ${env:OPENSEARCH_USERNAME}
      password: ${env:OPENSEARCH_PASSWORD}

service:
  extensions: [health_check, basicauth]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/health, resourcedetection, resource, transform/traces, tail_sampling, batch]
      exporters: [routing/traces]
    traces/finance:
      receivers: [routing/traces]
      exporters: [opensearch/traces-finance, otlp/dataprepper-traces]
    traces/notification:
      receivers: [routing/traces]
      exporters: [opensearch/traces-notification, otlp/dataprepper-traces]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, filter/metrics, resource, cumulativetodelta, batch]
      exporters: [otlp/dataprepper]
